name: Deploy to GitHub Pages (publish to main:/docs)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync static site to docs/
        run: |
          rm -rf docs || true
          mkdir -p docs
          rsync -a --delete www/ docs/
      - name: Commit and push docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if ! git diff --staged --quiet; then
            git commit -m "chore(publish): sync docs from www [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to docs/ — skipping commit"
          fi
      - name: Optionally trigger Pages build
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: static-site-publish
          client-payload: '{"trigger": "build-and-publish"}'
